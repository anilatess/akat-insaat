# Render.com Blueprint — https://render.com/docs/blueprint-spec
# GitHub reposunu Render'a bağlayıp bu dosyayı kullanarak tek seferde dağıtın.
services:
  - type: web
    name: akat-insaat
    runtime: node
    plan: starter # Kalıcı disk için gereklidir (free planda disk yoktur)
    region: frankfurt # Türkiye'ye en yakın bölge
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render güvenli rastgele bir anahtar üretir
      - key: DB_PATH
        value: /var/data/data.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      # İlk yönetici hesabı — Render panelinden güçlü değerler girin.
      # Girmezseniz varsayılan admin / akat2024 kullanılır (sonra panelden değiştirin).
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: akat-data
      mountPath: /var/data # Veritabanı + yüklenen görseller burada kalıcı tutulur
      sizeGB: 1
